# Optional: expose the service externally. Adjust ingressClassName / TLS / host
# to your cluster. Matches the existing reverse-proxy hostname for this project.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tts-server
  labels:
    app: tts-server
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: chatterbox-tts.kevyn.com.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tts-server
                port:
                  number: 80
  # tls:
  #   - hosts: [chatterbox-tts.kevyn.com.br]
  #     secretName: tts-server-tls
