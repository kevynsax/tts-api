apiVersion: apps/v1
kind: Deployment
metadata:
  name: tts-server
  labels:
    app: tts-server
spec:
  replicas: 1
  # The HF cache PVC is ReadWriteOnce; Recreate avoids two pods fighting over it.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tts-server
  template:
    metadata:
      labels:
        app: tts-server
    spec:
      containers:
        - name: tts-server
          # Replace with your pushed image (linux/amd64).
          image: REGISTRY/tts-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: TTS_MODEL          # default backend: chatterbox | kokoro
              value: "chatterbox"
            - name: TTS_DEVICE         # auto | cpu | cuda
              value: "cuda"
            - name: HF_HOME
              value: /data/huggingface
            # - name: TTS_API_KEY      # uncomment to require Bearer auth
            #   valueFrom:
            #     secretKeyRef: { name: tts-server, key: api-key }
          volumeMounts:
            - name: hf-cache
              mountPath: /data/huggingface
          resources:
            requests:
              cpu: "2"
              memory: 6Gi
            limits:
              cpu: "4"
              memory: 10Gi
              # GPU node: requires the NVIDIA device plugin on the cluster.
              nvidia.com/gpu: "1"
          # Server answers /health immediately (even while the model loads), so
          # liveness can probe it right away. /ready returns 200 only once the
          # model is in memory, gating traffic until the (slow) first load/download.
          startupProbe:
            httpGet: { path: /ready, port: http }
            periodSeconds: 10
            failureThreshold: 60      # up to ~10 min for first weight download
          readinessProbe:
            httpGet: { path: /ready, port: http }
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: tts-server-cache
