apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tts-server-cache
  labels:
    app: tts-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Holds the Hugging Face model cache (Chatterbox ~2GB + Kokoro ~0.4GB).
      storage: 10Gi
  # storageClassName: <your-storage-class>   # uncomment / set if not using the default
